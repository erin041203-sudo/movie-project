<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>검색 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>검색 결과</h1>

        <div class="movie-list">
            {% for movie in results %}
                <div class="movie-card">
                    <a href="/movie/{{ movie.id }}" class="movie-title">
                        {{ movie.title }}
                    </a>

                    {% if movie.poster_path %}
                        <img src="{{ image_base_url }}{{ movie.poster_path }}" alt="포스터">
                    {% endif %}

                    <div class="movie-info">
                        개봉일: {{ movie.release_date }}<br>
                        평점: {{ movie.vote_average }}
                    </div>
                </div>
            {% endfor %}
        </div>

        <a href="/movie-search" class="back-link">다시 검색</a>
    </div>
</body>
</html>
