<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="window-frame">
        <div class="window-bar"></div>
        <div class="auth-page">
            <div class="auth-card">
                <div class="logo-box"></div>
                <h1 class="service-title">방구석 평론가</h1>
                <p class="service-subtitle">Movie Review Service</p>

                {% if message %}
                <div class="success-box">{{ message }}</div>
                {% endif %}

                {% if error %}
                <div class="error-box">{{ error }}</div>
                {% endif %}

                <form method="post" action="/login" class="auth-form">
                    <label>아이디</label>
                    <input type="text" name="user_id" placeholder="아이디를 입력하세요">

                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요">

                    <div class="auth-actions">
                        <button type="submit" class="btn btn-primary">로그인</button>
                        <a href="/register" class="btn btn-secondary">회원가입</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
