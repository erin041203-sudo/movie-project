<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="window-frame">
        <div class="window-bar"></div>
        <div class="auth-page">
            <div class="register-card">
                <h1 class="register-title">회원가입</h1>

                <form method="post" action="/register" class="auth-form">
                    <label>아이디 *</label>
                    <input type="text" name="user_id" placeholder="4~20자 영문/숫자">

                    <label>비밀번호 *</label>
                    <input type="password" name="password" placeholder="8자 이상">

                    <label>비밀번호 확인 *</label>
                    <input type="password" name="password_confirm" placeholder="비밀번호를 다시 입력하세요" class="{% if error %}input-error{% endif %}">

                    {% if error %}
                    <p class="error-text">{{ error }}</p>
                    {% endif %}

                    <label>닉네임 *</label>
                    <input type="text" name="nickname" placeholder="화면에 표시될 이름">

                    <div class="auth-actions">
                        <button type="submit" class="btn btn-primary">가입하기</button>
                        <a href="/login" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
