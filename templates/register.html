<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="window-frame">
        <div class="window-bar"></div>
        <div class="auth-page">
            <div class="register-card">
                <h1 class="register-title">회원가입</h1>

                {% if error %}
                <div class="error-box">{{ error }}</div>
                {% endif %}

                <form method="post" action="/register" class="auth-form">
                    <label>아이디 *</label>
                    <div class="id-check-row">
                        <input type="text" name="user_id" id="user_id" placeholder="4~20자 영문/숫자">
                        <button type="button" id="check-id-btn" class="btn-check">중복 확인</button>
                    </div>

                    <div id="id-check-message" class="form-help"></div>
                    <label>비밀번호 *</label>
                    <input type="password" name="password" placeholder="8자 이상">

                    <label>비밀번호 확인 *</label>
                    <input type="password" name="password_confirm" placeholder="비밀번호를 다시 입력하세요">

                    <label>닉네임</label>
                    <input type="text" name="nickname" value="{{ random_nickname }}">
                    <p class="form-help">닉네임을 입력하지 않으면 랜덤 닉네임이 자동으로 배정됩니다.</p>

                    <div class="auth-actions">
                        <button type="submit" class="btn btn-primary">가입하기</button>
                        <a href="/login" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
<script>
    document.getElementById("check-id-btn").addEventListener("click", function () {
        const userId = document.getElementById("user_id").value.trim();
        const messageBox = document.getElementById("id-check-message");

        if (!userId) {
            messageBox.innerText = "아이디를 입력해주세요.";
            messageBox.style.color = "red";
            return;
        }

        fetch("/check-user-id?user_id=" + encodeURIComponent(userId))
            .then(function (res) {
                return res.json();
            })
            .then(function (data) {
                messageBox.innerText = data.message;
                messageBox.style.color = data.available ? "green" : "red";
            })
            .catch(function () {
                messageBox.innerText = "오류가 발생했습니다.";
                messageBox.style.color = "red";
            });
    });
</script>
</body>
</html>
